interface:
  display_name: "Sync Latest"
  short_description: "作業開始前、push 前、PR 作成前、PR 更新前、PR マージ前、non-fast-forward 解消など、対象 worktree の最新性が前提になる場面で、origin と upstream が属する remote から最新状態を取得し、ブランチまたは detached HEAD を適切な基準へ安全に同期する。"
  default_prompt: "Use $sync-latest to follow the Sync Latest workflow."

policy:
  allow_implicit_invocation: true
