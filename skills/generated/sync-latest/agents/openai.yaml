interface:
  display_name: "Sync Latest"
  short_description: "最新化の依頼を受けたときに、origin から最新状態を取得し、現在ブランチ、upstream、open PR、既定ブランチ、指定ブランチを確認して、必要な場合だけ安全に同期する。「最新マスタを取り込む」「最新 main を取り込む」「pull して」「PR の base を取り込む」「behind を解消する」「push 前に最新化する」「non-fast-forward を解消する」といった依頼で使う。"
  default_prompt: "Use $sync-latest to follow the Sync Latest workflow."

policy:
  allow_implicit_invocation: true
