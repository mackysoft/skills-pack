interface:
  display_name: "Sync Latest"
  short_description: "作業開始前、push 前、PR 作成前、PR 更新前、PR マージ前に、origin から最新状態を取得し、現在ブランチへ取り込むべき基準ブランチを決めて安全に同期する。「最新マスタを取り込む」「最新 main を取り込む」「pull して」「PR の base を取り込む」「behind を解消する」「push 前に最新化する」「non-fast-forward を解消する」といった依頼で使う。"
  default_prompt: "Use $sync-latest to follow the Sync Latest workflow."

policy:
  allow_implicit_invocation: true
