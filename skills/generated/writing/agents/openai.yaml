interface:
  display_name: "Writing"
  short_description: "自然言語の文章、ドキュメント、レビューコメント、Issue/PR本文、技術文書を作成、推敲、要約、翻訳、ローカライズするときに、文書前提に従って意味保持、事実性、論理構造、文書構造、文体、言語ごとの表記を整える。文章品質、冗長表現、技術文書の読みやすさを改善したいときに使う。"
  default_prompt: "Use $writing to follow the Writing workflow."

policy:
  allow_implicit_invocation: true
