interface:
  display_name: "Review Triage"
  short_description: "貼り付けられた、サブエージェントから返された、または自動生成されたコード・設計レビュー所見を、対象コード、要求、契約、関連資料と照合する。各所見を `採用 / 却下 / 保留 / 要確認` に分類し、重複を統合して対応方針へまとめる。レビュー返信作成や実装変更そのものが主目的のときは使わない。"
  default_prompt: "Use $review-triage to follow the Review Triage workflow."

policy:
  allow_implicit_invocation: true
