name: verify

env:
  DOTNET_SOLUTION: SkillsPack.slnx

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  dotnet:
    name: dotnet
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('SkillsPack.slnx', '**/*.csproj') }}

      - name: Restore
        run: dotnet restore "$DOTNET_SOLUTION"

      - name: Verify code
        run: >-
          bash scripts/verify.sh
          --no-restore
          --solution "$DOTNET_SOLUTION"
          --configuration Release
          --
          --logger "trx;LogFileName=ubuntu.trx"
          --results-directory "artifacts/test-results/ubuntu"

      - name: Pack CLI tool
        run: >-
          dotnet pack src/SkillsPack/SkillsPack.csproj
          --configuration Release
          --no-restore
          --output artifacts/packages

      - name: Smoke test CLI tool package
        run: bash scripts/verify-cli-package.sh artifacts/packages 0.0.0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results-ubuntu
          path: artifacts/test-results/ubuntu
          if-no-files-found: warn

  required:
    name: required
    runs-on: ubuntu-latest
    needs:
      - dotnet
    if: always()

    steps:
      - name: Evaluate required jobs
        shell: bash
        env:
          DOTNET_RESULT: ${{ needs.dotnet.result }}
        run: |
          set -euo pipefail

          if [[ "${DOTNET_RESULT}" != "success" ]]; then
            echo "dotnet job is required but finished with ${DOTNET_RESULT}." >&2
            exit 1
          fi

          echo "All required verification jobs completed successfully."
