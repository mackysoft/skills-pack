interface:
  display_name: "Ultra Review"
  short_description: "サブエージェントを複数起動し、変更差分または指定範囲を目的との整合、必要性、脆弱性、凝集性、責務境界などから反復レビューする。所見をトリアージし、安全に修正できる採用所見の修正、検証、再レビューまで行う。深いレビュー、修正込みレビュー、または ultra-review が求められたときに使う。編集禁止やレビューのみの指定がある場合は所見と対応方針だけを返す。"
  default_prompt: "Use $ultra-review to follow the Ultra Review workflow."

policy:
  allow_implicit_invocation: true
